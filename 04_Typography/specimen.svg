<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1200" viewBox="0 0 1200 1200" role="img" aria-label="Blossy typography specimen">
<rect width="1200" height="1200" fill="#FAF4EC"/>
<text x="60" y="78" font-family="Playfair Display,Georgia,serif" font-size="40" fill="#1A1A1A">Blossy — typography</text>
<text x="60" y="108" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="13" letter-spacing="2" fill="#E96A2E">FIVE FACES · ONE JOB EACH</text>
<text x="60" y="170" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="12" letter-spacing="1.6" fill="#5A5550">PLAYFAIR DISPLAY</text>
<text x="1140" y="170" text-anchor="end" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="12" letter-spacing="1.4" fill="#E96A2E">DISPLAY · HEADINGS</text>
<text x="60" y="232" font-family="Playfair Display,Georgia,serif" font-size="54" fill="#1A1A1A" >Look like yourself.</text>
<text x="60" y="284" font-family="Playfair Display,Georgia,serif" font-size="34" font-style="italic" fill="#E96A2E">Editorial, on demand.</text>
<text x="60" y="318" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="12" fill="#5A5550">All h1/h2/h3 · weight 400 only · letter-spacing −0.02em · token: font-fraunces</text>
<line x1="60" y1="354" x2="1140" y2="354" stroke="#E7DFD3"/>
<text x="60" y="408" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="12" letter-spacing="1.6" fill="#5A5550">FIGTREE</text>
