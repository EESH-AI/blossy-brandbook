<text x="60" y="912" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="32" fill="#1A1A1A" >1,240 credits · &#8364;18.00</text>
<text x="60" y="956" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="15" letter-spacing="3" fill="#E96A2E">EDITORIAL AI PHOTOSHOOTS OF YOU</text>
