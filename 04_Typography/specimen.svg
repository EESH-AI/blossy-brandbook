<text x="60" y="470" font-family="Figtree,Helvetica,Arial,sans-serif" font-size="38" fill="#1A1A1A" >Turn your selfies into a photoshoot.</text>
<text x="60" y="522" font-family="Figtree,Helvetica,Arial,sans-serif" font-size="26" font-weight="400" fill="#1A1A1A">Regular</text>
<text x="60" y="542" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="11" fill="#8b8378">400</text>
<text x="250" y="522" font-family="Figtree,Helvetica,Arial,sans-serif" font-size="26" font-weight="500" fill="#1A1A1A">Medium</text>
<text x="250" y="542" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="11" fill="#8b8378">500</text>
<text x="440" y="522" font-family="Figtree,Helvetica,Arial,sans-serif" font-size="26" font-weight="600" fill="#1A1A1A">SemiBold</text>
<text x="440" y="542" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="11" fill="#8b8378">600</text>
<text x="630" y="522" font-family="Figtree,Helvetica,Arial,sans-serif" font-size="26" font-weight="700" fill="#1A1A1A">Bold</text>
<text x="630" y="542" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="11" fill="#8b8378">700</text>
<text x="60" y="574" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="12" fill="#5A5550">SIL OFL · via Google Fonts · variable weight 300–900 · token: font-inter</text>
<line x1="60" y1="610" x2="1140" y2="610" stroke="#E7DFD3"/>
<text x="60" y="664" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="12" letter-spacing="1.6" fill="#5A5550">GEIST</text>
<text x="1140" y="664" text-anchor="end" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="12" letter-spacing="1.4" fill="#E96A2E">BODY · THE PRODUCT UI</text>
<text x="60" y="726" font-family="Geist,Helvetica,Arial,sans-serif" font-size="34" fill="#1A1A1A" >Your dashboard, credits &amp; photoshoots.</text>
<text x="60" y="760" font-family="Geist Mono,DejaVu Sans Mono,monospace" font-size="12" fill="#5A5550">Default UI sans behind login · applied implicitly via --font-sans</text>
